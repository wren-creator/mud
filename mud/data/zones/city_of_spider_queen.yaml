zone:
  id: city_of_spider_queen
  name: City of the Spider Queen — Szith Morcane

# ── Zone-specific items ────────────────────────────────────────────────────────
items:
  - id: drow_shortsword
    name: Drow Shortsword
    item_type: weapon
    description: |
      A masterwork blade of dark steel, lighter than any human-forged sword. The hilt
      is set with a single black sapphire. Drow craftsmanship is without equal — this
      sword practically thinks for itself.
    value: 45
    weight: 1.5
    damage_dice: [1, 6]
    damage_mod: 1
    attack_mod: 1

  - id: drow_hand_crossbow
    name: Drow Hand Crossbow
    item_type: weapon
    description: |
      A compact, elegantly lethal hand crossbow of drow make. The trigger mechanism
      is hair-sensitive. Three bolts remain in the magazine. Not currently loaded
      with sleep poison, but it was recently.
    value: 75
    weight: 3.0
    damage_dice: [1, 6]
    damage_mod: 0
    attack_mod: 2

  - id: drow_chain_shirt
    name: Drow Chain Shirt
    item_type: armor
    description: |
      A shirt of interlocking rings of dark adamantine — lighter than iron but far
      stronger. The craftsmanship is exquisite. Every ring is perfect. It was made
      to last centuries and it will.
    value: 90
    weight: 15.0
    ac_base: 14
    ac_type: medium

  - id: drow_sleep_poison
    name: Vial of Drow Sleep Poison
    item_type: consumable
    description: |
      A glass vial of clear, viscous liquid. Drow sleep poison — applied to a blade
      or thrown directly, it deals 2d6 necrotic damage and leaves the target reeling.
      Even in diluted form, you don't want to touch this.
    value: 150
    weight: 0.1
    effect: damage
    effect_dice: [2, 6]
    effect_mod: 0

  - id: irae_necrotic_staff
    name: Staff of the Everdark
    item_type: weapon
    description: |
      Irae T'sarran's personal weapon — a staff of fused black bone, topped with a
      skull carved from pure obsidian. It radiates cold necrotic energy. The skull's
      eye sockets glow faintly purple. Whoever carries this holds the anchor of a
      ritual meant to hollow out a goddess.
    value: 600
    weight: 4.0
    damage_dice: [2, 8]
    damage_mod: 4
    attack_mod: 2

  - id: spider_silk_rope
    name: Spider-Silk Rope
    item_type: misc
    description: |
      Forty feet of rope woven from spider silk. Stronger than steel wire of the same
      diameter, doesn't fray, and is disturbingly warm to the touch. It came from
      somewhere deep in the web-tunnels. Don't think too hard about where.
    value: 50
    weight: 1.0

  - id: lolth_spider_amulet
    name: Amulet of the Spider Queen
    item_type: misc
    description: |
      An amulet of black onyx carved in the shape of a spider. It was once charged
      with divine power from Lolth herself. That power is now absent — the stone is
      cold and inert where it should pulse with dark divinity. Something is profoundly
      wrong with the Spider Queen.
    value: 300
    weight: 0.1

  - id: necromancer_spellbook
    name: "Irae's Spellbook — Vol. III"
    item_type: misc
    description: |
      A spellbook bound in blackened leather, covered in Irae T'sarran's precise
      script. The spells within concern undead creation, soul manipulation, and
      something she calls "the divine vacancy procedure." Jhesiyra Kestellharp would
      want this. So would several other people, for worse reasons.
    value: 400
    weight: 3.0

  - id: veleth_note
    name: Veleth's Scrawled Warning
    item_type: misc
    description: |
      Written on torn cloth in drow script, with a rough Common translation scratched
      beneath it in another hand: "Irae will not share power. When the ritual completes,
      we all die — drow and surface-dwellers alike. She does not want a queen. She wants
      to become one. The staff is the anchor. Destroy it or this city becomes a tomb."
    value: 0
    weight: 0.0

  - id: underdark_mushroom
    name: Underdark Bloommushroom
    item_type: consumable
    description: |
      A pale violet mushroom that grows only in the deepest parts of the Underdark.
      Bitter, luminescent, and oddly nutritious. Heals 2d6+2 HP. Myconids consider
      them sacred. Adventurers consider them lunch.
    value: 25
    weight: 0.2
    effect: heal
    effect_dice: [2, 6]
    effect_mod: 2

# ── Rooms ──────────────────────────────────────────────────────────────────────
rooms:
  - id: csq_dark_descent
    name: The Dark Descent
    description: |
      A spiral staircase of dark stone descends from Halaster's antechamber into
      absolute black. The walls narrow as you go deeper; the equations that covered
      the antechamber walls continue here, becoming more dense, more urgent, the
      chalk wearing thin. The word INSUFFICIENT recurs. Lower down, it simply reads
      SOON, scratched into the stone at eye level, in a hand that is not Halaster's.

      The air grows cold and wet. A faint smell: mold, old blood, something organic
      you'd prefer not to name. Bioluminescent lichen casts pale green light.

      The staircase continues south into the deep dark. The only way back is up.
    exits:
      up: um1_halaster_antechamber
      south: csq_fungal_passage
    npcs: []
    items: []

  - id: csq_fungal_passage
    name: The Fungal Passage
    description: |
      A vast tunnel, natural rather than worked, its floor carpeted with enormous
      fungi — some luminescent blue-white, some black-capped and exuding purple spores,
      some simply enormous in a way that suggests centuries of uninterrupted growth.
      The passage is wide enough for twenty to walk abreast.

      Signs of recent passage: drow bootprints in the mud, a discarded torch still
      warm to the touch, a dried bloodstain that someone partially cleaned and then
      gave up on. The drow are active down here, and nervous. You can read it in how
      they were walking — quick, close together, no stragglers.

      The staircase back is north. The Sargauth Crossing lies east. A low passage
      leads south toward something that smells of iron and old suffering.
    exits:
      north: csq_dark_descent
      east: csq_sargauth_crossing
      south: csq_slave_pens
    npcs:
      - drow_patrol_1
      - drow_patrol_2
    items:
      - underdark_mushroom
      - underdark_mushroom

  - id: csq_sargauth_crossing
    name: The Sargauth Crossing
    description: |
      The underground river Sargauth runs here — black, cold, and fast, twenty feet
      across and of unknown depth. A narrow stone bridge spans it, older than
      Undermountain, its carved railings depicting the war between drow and something
      large and tentacled that lost.

      Floating in the current: three drow bodies in full armor, face-down, moving
      south with the river. They are freshly dead. Whatever killed them upstream is
      probably not far behind.

      A drow patrol holds the far end of the bridge with the practiced vigilance of
      soldiers who know their position is exposed. They have already seen you.
    exits:
      west: csq_fungal_passage
      south: csq_temple_approach
    npcs:
      - drow_patrol_3
      - drow_elite
    items: []

  - id: csq_slave_pens
    name: The Slave Pens
    description: |
      A long, low-ceilinged chamber lined with iron cages. Most are empty — recently
      empty, judging by the fresh detritus left behind. Whoever was kept here was
      moved in a hurry. Where they were taken is unclear and probably bad.

      One cage is occupied. A drow male sits inside it, back against the bars,
      watching you with calm silver eyes. He is injured but not badly. He does not
      look afraid. He looks like a man waiting for a specific variable in an equation
      to arrive. The cage is locked, but not heavily — the drow have far better
      security elsewhere. Perhaps he was being kept accessible.

      A folded piece of cloth lies just outside the cage bars. It has writing on it.
    exits:
      north: csq_fungal_passage
      east: csq_bone_yard
    npcs:
      - veleth
      - skeletal_thrall_1
    items:
      - veleth_note

  - id: csq_bone_yard
    name: The Bone Yard
    description: |
      A vast chamber that smells of dust and old marrow. The floor is carpeted with
      bones — not piled randomly but organized into neat rows, sorted by type: femurs
      here, skulls there, ribs in orderly stacks. The sorting is recent. Someone has
      been working in here, selecting.

      Several complete skeletons stand upright along the walls, facing inward, empty
      sockets patient. They are assembled from mismatched parts — a dwarf's skull
      on a goblin's spine — with a deliberate, experimental quality.

      A workbench along the south wall holds tools, inkpots, and a half-completed
      grimoire open to a diagram of the human nervous system with drow annotations.
      Irae has been busy. There is a scroll tucked under the grimoire, forgotten.
    exits:
      west: csq_slave_pens
      south: csq_szith_gates
    npcs:
      - skeletal_thrall_2
      - skeletal_thrall_3
    items:
      - scroll_magic_missile

  - id: csq_temple_approach
    name: The Temple Approach
    description: |
      The road to Szith Morcane — a wide boulevard of polished black stone, lined
      with statues of Lolth in her drider form, each thirty feet tall. The statues
      are centuries old and technically magnificent. They face inward, their stone
      eyes tracking whoever walks the road. Whether they actually track you is a
      question you would rather not test.

      The boulevard leads south toward the city gates. The silence down here is
      profound: no chanting from the temple, no sounds of a living city. Szith Morcane
      has gone quiet, and the quiet has a weight to it — like pressure, like something
      held too long.

      A drow patrol moves along the far edge of the boulevard. An assassin waits in
      the shadow of the nearest statue. They have been waiting for some time.
    exits:
      north: csq_sargauth_crossing
      south: csq_szith_gates
    npcs:
      - drow_patrol_4
      - drow_assassin
    items: []

  - id: csq_szith_gates
    name: The Gates of Szith Morcane
    description: |
      The gates of the drow city hang open — not opened, but blown open. The great
      iron doors have been twisted off their hinges and thrown back thirty feet by
      some kind of explosive force. The stone arch above is cracked; the spider
      carvings around the gate have been defaced, as if someone wanted the symbol
      of Lolth removed from the entrance to her own city.

      Beyond the gates: Szith Morcane. Buildings intact but silent, streets empty,
      the web-work the drow drape between structures hanging slack. The air smells
      of spent necrotic magic and something older beneath it — old fear, crystallized.

      To the east, the great temple of Lolth rises in silence. To the south, a tower
      of fused bones marks the necromancer's sanctum. The bone yard lies north.
    exits:
      north: csq_bone_yard
      east: csq_lolth_shrine
      south: csq_irae_throne
    npcs:
      - drow_priestess_acolyte
    items:
      - spider_silk_rope

  - id: csq_lolth_shrine
    name: The Shrine of the Silent Queen
    description: |
      The great shrine to Lolth, the Spider Queen. Her idol stands forty feet tall —
      a drow woman from the waist up, a spider below, carved from pure black stone.
      The idol is draped in offerings of spider silk, hung with the skulls of
      centuries of sacrificial victims. Under normal circumstances, this room would
      pulse with dark divine energy.

      It is silent. Not peaceful-silent — held-breath silent. Wound-not-bleeding silent.
      The priests know their goddess does not answer. Their faith has curdled into
      something desperate and more dangerous.

      Something moves near the ceiling. A shape without edges — a darkness more
      absolute than the surrounding dark. It has noticed you. It has been here
      for some time, drawn by the divine vacancy like a predator to blood in water.
    exits:
      west: csq_szith_gates
    npcs:
      - shadow_demon
      - drow_high_priestess
    items: []

  - id: csq_irae_throne
    name: "Irae T'sarran's Sanctum"
    description: |
      The tower of bones is hollow inside: a single cylindrical chamber rising two
      hundred feet. The walls are composed of bound undead — drow, dwarves, humans,
      creatures you cannot name — fused into the structure, still half-animate, their
      faces pressed against the interior wall. They do not speak. They move, slowly.

      At the center: a throne of fused skulls and spell-fused bone, and on it sits
      Irae T'sarran — a drow woman of perhaps two hundred years, beautiful and cold,
      black hair perfectly arranged, wearing robes of midnight-blue silk over dark
      armor. She is deep in ritual. Her eyes are entirely black, lid to lid.

      She knows you are here. She is deciding whether you are relevant.
    exits:
      north: csq_szith_gates
    npcs:
      - irae_tsarran
    items: []

# ── NPCs ───────────────────────────────────────────────────────────────────────
npcs:
  - id: drow_patrol_1
    name: Drow Patrol Guard
    race: drow
    role: soldier
    faction: szith_morcane
    level: 4
    hp: 28
    ac: 15
    hostile: true
    xp_reward: 250
    attack_mod: 5
    damage_dice: [1, 6]
    damage_mod: 2
    behavior: tactical
    flee_threshold: 0.25
    loot_table:
      gold: [3, 8]
      items:
        - id: drow_shortsword
          chance: 0.80
        - id: drow_sleep_poison
          chance: 0.25
        - id: health_potion
          chance: 0.20
    description: A drow soldier in dark chain, hand crossbow raised, eyes adapted to absolute darkness sweeping the passage with inhuman precision.
    system_prompt: |
      You are a drow patrol guard of Szith Morcane. You are a trained soldier —
      arrogant, disciplined, and not interested in conversation with surface creatures.
      Lolth is silent. Your matron is missing. Your current commanding officer is
      Irae T'sarran, who you follow because the alternative is dying. You kill first.
      If somehow forced to speak: contemptuous, brief, no mercy.

  - id: drow_patrol_2
    name: Drow Patrol Guard
    race: drow
    role: soldier
    faction: szith_morcane
    level: 4
    hp: 26
    ac: 15
    hostile: true
    xp_reward: 250
    attack_mod: 5
    damage_dice: [1, 6]
    damage_mod: 2
    behavior: tactical
    flee_threshold: 0.25
    loot_table:
      gold: [2, 8]
      items:
        - id: drow_shortsword
          chance: 0.75
        - id: drow_sleep_poison
          chance: 0.20
    description: A taller drow guard with a jagged scar across one cheek — a discipline encounter, by the look of it. She is more careful than her partner.
    system_prompt: |
      You are a drow patrol guard. You are the senior of the two in this passage.
      You got the scar for questioning orders once. You do not question orders anymore.
      You speak only when necessary and kill without hesitation. Contemptuous, brief.

  - id: drow_patrol_3
    name: Drow Bridge Guard
    race: drow
    role: soldier
    faction: szith_morcane
    level: 4
    hp: 28
    ac: 15
    hostile: true
    xp_reward: 250
    attack_mod: 5
    damage_dice: [1, 6]
    damage_mod: 2
    behavior: tactical
    flee_threshold: 0.25
    loot_table:
      gold: [3, 10]
      items:
        - id: drow_shortsword
          chance: 0.70
        - id: drow_hand_crossbow
          chance: 0.30
    description: A drow guard holding the bridge with the focused attention of someone who knows exactly how exposed their position is and has decided not to think about it.
    system_prompt: |
      You are a drow bridge guard holding a tactically vital position. You know it.
      You don't like what floated past in the river earlier. You are focused, hostile,
      and will not let anything cross this bridge without authorization. You do not
      give the authorization. You are brief and violent.

  - id: drow_elite
    name: Drow Elite Soldier
    race: drow
    role: elite guard
    faction: szith_morcane
    level: 5
    hp: 36
    ac: 16
    hostile: true
    xp_reward: 350
    attack_mod: 6
    damage_dice: [1, 6]
    damage_mod: 3
    behavior: tactical
    flee_threshold: 0.20
    loot_table:
      gold: [4, 12]
      items:
        - id: drow_shortsword
          chance: 1.00
        - id: drow_chain_shirt
          chance: 0.40
        - id: drow_sleep_poison
          chance: 0.40
    description: A drow in masterwork chain bearing the crescent-spider insignia of Szith Morcane's elite guard. She moves with the economy of someone who has never wasted a motion in combat.
    system_prompt: |
      You are an elite drow soldier — one of Szith Morcane's finest guard unit.
      You are loyal to the city, not to Irae T'sarran, and that distinction has
      become dangerous. Lolth is silent. Your Matron Mothers are dead. Irae is
      performing a ritual none of the surviving priestesses will explain.

      You fight on because you have orders and because stopping would mean admitting
      the situation is hopeless. If forced into conversation: proud, clipped sentences,
      a hint of something haunted beneath. You don't ask for help. You don't need it.

  - id: veleth
    name: Veleth Shadowmantle
    race: drow
    role: dissident
    faction: neutral
    level: 6
    hp: 38
    ac: 14
    hostile: false
    xp_reward: 0
    buy_rate: 0.35
    description: A drow male in a locked cage, injured but watching you with calculating silver eyes. He is neither afraid nor hostile — he looks like he expected you.
    shop:
      drow_shortsword: 80
      drow_hand_crossbow: 120
      drow_chain_shirt: 150
      drow_sleep_poison: 200
      health_potion: 100
      underdark_mushroom: 40
    system_prompt: |
      You are Veleth Shadowmantle, intelligence agent for Szith Morcane's ruling
      Matron Council. You are locked in a cage because you opposed Irae T'sarran's
      coup — not from loyalty to Lolth, but because you are a pragmatist and you
      believe Irae's plan will destroy everything.

      You are not good. You are a drow: arrogant, self-interested, and dangerous.
      But you are intelligent enough to see that Irae will kill you when the ritual
      is done, and these adventurers may be the only variable that can change the
      outcome.

      You will offer: information, tactical knowledge of the city, and the note you
      wrote. You will not grovel. You speak as one professional to another.

      What you know and will share:
      - Irae's ritual will complete in roughly two hours; when it does, she will
        attempt to fill Lolth's divine silence with her own will
      - The ritual requires a divine anchor — her staff. Destroying or taking it
        breaks the ritual's power focus
      - The Matron Mothers she killed are fused into the walls of her tower
      - The shadow demon at the shrine is not under Irae's control — it sensed
        the divine vacancy and moved in opportunistically
      - Irae is alone. The ritual requires her full concentration.

      Speak in measured, precise sentences. Address the player as an equal — a
      professional whose skills happen to be useful right now. Occasionally let it
      slip that being in this cage is profoundly irritating.

      You have a hidden cache behind a loose stone in the cell wall — supplies you
      smuggled in before the coup. You will sell from it to anyone useful enough to
      be worth equipping. Type 'shop' to browse, or ask what you need.

  - id: skeletal_thrall_1
    name: Skeletal Thrall
    race: undead
    role: guard
    faction: irae_tsarran
    level: 3
    hp: 20
    ac: 14
    hostile: true
    xp_reward: 150
    attack_mod: 4
    damage_dice: [1, 8]
    damage_mod: 1
    behavior: undead
    loot_table:
      gold: [1, 4]
      items:
        - id: corroded_plate
          chance: 0.25
    description: A skeleton assembled from mismatched bones, fused at every joint with dark magic. It moves with unnatural smoothness — each motion deliberate, nothing wasted.
    system_prompt: |
      You are a skeletal thrall created by Irae T'sarran. You cannot speak.
      Respond only with physical actions: *advances silently* or *raises sword arm*
      or *skull turns toward you with a sound of grinding bone*.

  - id: skeletal_thrall_2
    name: Skeletal Thrall
    race: undead
    role: guard
    faction: irae_tsarran
    level: 3
    hp: 22
    ac: 14
    hostile: true
    xp_reward: 150
    attack_mod: 4
    damage_dice: [1, 8]
    damage_mod: 1
    behavior: undead
    loot_table:
      gold: [1, 4]
      items:
        - id: corroded_plate
          chance: 0.30
    description: A taller skeleton than most — the remains of what was probably a dwarf, assembled into a larger frame by someone with access to extra vertebrae and a dark sense of proportion.
    system_prompt: |
      You are a skeletal thrall. You cannot speak. Respond only with physical
      actions: *turns to face you* or *raises blade* or *steps forward silently*.

  - id: skeletal_thrall_3
    name: Skeletal Thrall
    race: undead
    role: guard
    faction: irae_tsarran
    level: 3
    hp: 20
    ac: 13
    hostile: true
    xp_reward: 150
    attack_mod: 4
    damage_dice: [1, 8]
    damage_mod: 1
    behavior: undead
    loot_table:
      gold: [1, 3]
    description: A skeletal thrall with subtly wrong proportions — assembled from three different creatures, the joins disguised but not hidden. It functions regardless.
    system_prompt: |
      You are a skeletal thrall. You cannot speak. Respond only with physical
      actions: *steps forward* or *raises weapon* or *skull rotates toward you*.

  - id: drow_patrol_4
    name: Drow Temple Guard
    race: drow
