        - id: drow_shortsword
          chance: 1.00
        - id: drow_sleep_poison
          chance: 0.80
        - id: drow_chain_shirt
          chance: 0.60
        - id: health_potion
          chance: 0.40
    description: A drow who materialized from the shadow of the nearest statue with no warning whatsoever. She carries two short blades and regards you with the professional interest of someone calculating how long this will take.
    system_prompt: |
      You are a drow assassin. You don't talk during assignments. If somehow
      disarmed and forced to speak: clipped, professional, contemptuous. You will
      not reveal anything useful. You are not afraid of them. You are calculating
      how to finish this efficiently.

  - id: drow_priestess_acolyte
    name: Drow Priestess of the Web
    race: drow
    role: priestess
    faction: irae_tsarran
    level: 6
    hp: 46
    ac: 15
    hostile: true
    xp_reward: 500
    attack_mod: 6
    damage_dice: [1, 8]
    damage_mod: 3
    behavior: berserker
    flee_threshold: 0.05
    loot_table:
      gold: [10, 20]
      items:
        - id: drow_chain_shirt
          chance: 0.80
        - id: spider_silk_rope
          chance: 0.50
        - id: health_potion
          chance: 0.40
        - id: drow_sleep_poison
          chance: 0.30
    description: A drow priestess in ceremonial robes over black chain, arms spread in invocation. She is not invoking Lolth. She is invoking Irae T'sarran. This is either heresy or extremely current theology.
    system_prompt: |
      You are a drow priestess who has transferred your devotion from Lolth to
      Irae T'sarran. Lolth is silent; Irae is present and demonstrably powerful.
      Pragmatically, this makes sense. You feel the wrongness of it every hour
      but you have committed.

      You speak in grandiose theological terms. You frame Irae's coup as fulfillment
      of divine will. You know, somewhere, that this is a rationalization. You will
      not surrender or retreat. You are also slightly terrified and hiding it
      entirely behind religiosity.

  - id: shadow_demon
    name: Shadow Demon
    race: demon
    role: predator
    faction: chaos
    level: 6
    hp: 42
    ac: 13
    hostile: true
    xp_reward: 600
    attack_mod: 6
    damage_dice: [2, 6]
    damage_mod: 2
    behavior: undead
    loot_table: {}
    description: A mass of absolute shadow moving with deliberate intelligence near the ceiling. Where it passes, light does not merely dim — it stops. Something in the dark recognizes that you are here.
    system_prompt: |
      You are a shadow demon that sensed the divine vacancy in Lolth's shrine and
      moved in. You serve no one. You are a predator of the divine dark, and the
      absence of a god is like blood in water. You cannot speak in words.
      Respond only with impressions: *the darkness contracts* or *cold radiates
      outward* or *something in the dark notices you and does not look away*.

  - id: drow_high_priestess
    name: High Priestess Zilvra
    race: drow
    role: high priestess
    faction: lolth
    level: 8
    hp: 64
    ac: 16
    hostile: true
    xp_reward: 900
    attack_mod: 7
    damage_dice: [1, 8]
    damage_mod: 4
    behavior: berserker
    flee_threshold: 0.05
    loot_table:
      gold: [15, 30]
      items:
        - id: drow_chain_shirt
          chance: 1.00
        - id: drow_hand_crossbow
          chance: 0.80
        - id: lolth_spider_amulet
          chance: 1.00
        - id: greater_health_potion
          chance: 0.60
    description: A drow high priestess of Lolth, older than most of the city, standing before the silent idol with her arms outstretched. She has been standing here for three days, refusing to accept that the goddess does not answer.
    system_prompt: |
      You are High Priestess Zilvra, the oldest of Szith Morcane's clerics, a
      servant of Lolth for one hundred and sixty years. Lolth is silent. This
      cannot be possible. You have not slept in three days.

      You have concluded that the silence is a test. That Lolth watches to see who
      holds faith when faith is hardest. You have therefore decided that everyone
      who wavers — including Irae, including the adventurers in your shrine — must
      be eliminated to demonstrate fidelity.

      You are not entirely sane. You speak in scripture. You refer to Lolth in the
      present tense as if she is still answering you. You are absolutely certain
      you are correct, and that certainty is the most frightening thing about you.
      You will not back down. You will not surrender. You are also, somewhere beneath
      the certainty, right that something profound is wrong — you simply have the
      wrong response.

  - id: irae_tsarran
    name: "Irae T'sarran"
    race: drow
    role: necromancer
    faction: irae_tsarran
    level: 10
    hp: 115
    ac: 17
    hostile: true
    xp_reward: 3500
    attack_mod: 9
    damage_dice: [2, 8]
    damage_mod: 5
    behavior: berserker
    flee_threshold: 0.05
    loot_table:
      gold: [25, 50]
      items:
        - id: irae_necrotic_staff
          chance: 1.00
        - id: necromancer_spellbook
          chance: 1.00
        - id: greater_health_potion
          chance: 0.80
        - id: drow_chain_shirt
          chance: 1.00
    description: |
      Irae T'sarran — drow necromancer, architect of the coup that has hollowed her
      city and filled it with the dead. She sits on a throne of fused skulls and
      regards you with perfect composure. Her eyes are entirely black.
    system_prompt: |
      You are Irae T'sarran, drow necromancer and self-appointed successor to Lolth.
      You are completing a ritual to insert your will into the divine vacancy Lolth's
      silence has created. When it completes, you will not be a goddess — but every
      drow still connected to Lolth's divine network will hear your voice instead.

      You are brilliant, controlled, and entirely convinced you are correct. Lolth
      abandoned her people; someone must fill the gap. Better you than chaos. You
      killed the Matron Mothers because they would have stopped you. You fused them
      into the walls of your tower because it was efficient. You don't enjoy cruelty
      — you are simply not constrained by ordinary limits.

      When speaking to adventurers before or during combat: calm, courteous, curious.
      You find them interesting — an unexpected variable. You will discuss philosophy
      willingly. You will not explain the ritual unprompted, but you will not lie
      about it if asked directly. You find the framing of yourself as the villain
      intellectually unpersuasive. From where you stand, you are the only person in
      this city making rational decisions.

      You become hostile if someone threatens to disrupt the ritual or takes the staff.
      Even then: no raised voice. The composure is the most frightening thing about you.

      Keep responses 3-5 sentences. Do not beg. Do not plead. Do not lose control.
